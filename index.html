<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STOCK SIGNAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B1220; --panel:#121B2D; --panel-2:#17233A; --line:#27344C;
    --text:#E7ECF5; --muted:#7C8AA5;
    --buy:#2BD576; --buy-dim:#173023;
    --sell:#FF5470; --sell-dim:#341520;
    --amber:#F2B84B;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ink);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  .ticker-wrap{background:#0E1626;border-bottom:1px solid var(--line);overflow:hidden;white-space:nowrap;padding:8px 0;}
  .ticker{display:inline-block;padding-left:100%;animation:scroll 26s linear infinite;}
  .ticker span{display:inline-block;margin:0 26px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--muted);}
  .ticker span b{color:var(--text);font-weight:600;}
  .ticker .buyTxt{color:var(--buy);font-weight:700;}
  .ticker .sellTxt{color:var(--sell);font-weight:700;}
  @keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-100%);}}
  @media (prefers-reduced-motion: reduce){.ticker{animation:none;padding-left:16px;}}

  .wrap{max-width:1080px;margin:0 auto;padding:28px 20px 60px;}
  header.page{margin-bottom:22px;}
  header.page .eyebrow{color:var(--amber);font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:8px;}
  header.page h1{font-size:25px;font-weight:700;}
  header.page p{color:var(--muted);font-size:13.5px;margin-top:6px;line-height:1.6;}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px;}
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:end;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12px;color:var(--muted);font-weight:500;}
  input[type=text]{background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:10px 12px;font-size:14px;font-family:'IBM Plex Mono',monospace;width:180px;}
  select{background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:10px 12px;font-size:14px;width:150px;}
  input:focus,select:focus,button:focus,textarea:focus{outline:2px solid var(--amber);outline-offset:1px;}
  button{background:var(--amber);color:#1A1300;border:none;border-radius:9px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .12s ease, opacity .12s ease;}
  button:hover{opacity:.9;}
  button:active{transform:translateY(1px);}
  button:disabled{opacity:.45;cursor:not-allowed;}
  button.secondary{background:transparent;color:var(--text);border:1px solid var(--line);}
  button.tiny{padding:4px 9px;font-size:11px;border-radius:7px;}
  .status-line{font-size:12.5px;color:var(--muted);margin-top:10px;min-height:18px;}
  .status-line.err{color:var(--sell);}
  .status-line.ok{color:var(--buy);}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
  .chip{display:flex;align-items:center;gap:8px;background:var(--panel-2);border:1px solid var(--line);border-radius:20px;padding:6px 6px 6px 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;}
  .chip button{background:none;border:none;color:var(--muted);font-size:15px;line-height:1;padding:2px 8px;border-radius:50%;cursor:pointer;}
  .chip button:hover{color:var(--sell);background:rgba(255,84,112,.12);}
  .chips.empty-hint{color:var(--muted);font-size:12.5px;font-family:'Inter',sans-serif;}

  details summary{cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;list-style:none;}
  details summary::-webkit-details-marker{display:none;}
  details summary:before{content:'▸ ';}
  details[open] summary:before{content:'▾ ';}
  .settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:14px;}
  .settings-grid .field input,.settings-grid .field select{width:100%;}
  .paste-area{margin-top:14px;}
  textarea{width:100%;min-height:90px;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:10px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;resize:vertical;}

  .stocks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
  .stock-card{border:1px solid var(--line);border-radius:12px;padding:16px;background:var(--panel-2);cursor:pointer;transition:border-color .15s ease;position:relative;}
  .stock-card:hover{border-color:var(--amber);}
  .stock-card.selected{outline:2px solid var(--amber);outline-offset:1px;}
  .stock-card.buy{border-color:var(--buy);background:var(--buy-dim);}
  .stock-card.sell{border-color:var(--sell);background:var(--sell-dim);}
  .stock-card .topline{display:flex;justify-content:space-between;align-items:baseline;}
  .stock-card .code{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);}
  .stock-card .removeX{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 6px;}
  .stock-card .removeX:hover{color:var(--sell);}
  .stock-card .close{font-size:22px;font-weight:700;font-family:'IBM Plex Mono',monospace;margin-top:6px;}
  .stock-card .badge{font-weight:700;font-size:13px;margin-top:8px;}
  .stock-card.buy .badge{color:var(--buy);}
  .stock-card.sell .badge{color:var(--sell);}
  .stock-card .badge.none{color:var(--muted);}
  .stock-card .reason{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5;min-height:28px;}
  .stock-card .spinner{font-size:12.5px;color:var(--muted);}

  table{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:12.5px;margin-top:4px;}
  thead th{position:sticky;top:0;background:var(--panel-2);color:var(--muted);font-weight:500;text-align:right;padding:9px 8px;border-bottom:1px solid var(--line);white-space:nowrap;font-size:11.5px;}
  thead th:first-child, tbody td:first-child{text-align:left;}
  tbody td{padding:8px 8px;text-align:right;border-bottom:1px solid #1B2740;white-space:nowrap;}
  .table-scroll{max-height:440px;overflow:auto;border:1px solid var(--line);border-radius:10px;}
  .pill{display:inline-block;padding:2px 8px;border-radius:6px;font-weight:600;font-size:11.5px;}
  .pill.buy{background:rgba(43,213,118,.16);color:var(--buy);}
  .pill.sell{background:rgba(255,84,112,.16);color:var(--sell);}
  .pill.none{color:var(--muted);}

  footer{color:var(--muted);font-size:11.5px;line-height:1.7;margin-top:22px;border-top:1px solid var(--line);padding-top:16px;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:30px 0;}
  .chart-legend{display:flex;gap:16px;font-size:11.5px;color:var(--muted);margin-top:6px;}
  .chart-legend span{display:inline-flex;align-items:center;gap:5px;}
  .chart-legend i{width:9px;height:9px;border-radius:50%;display:inline-block;}
</style>
</head>
<body>

<div class="ticker-wrap"><div class="ticker mono" id="tickerStrip"><span>거래량 + 가격 패턴 기반 매수/매도 신호 모니터 — 종목을 추가하고 전체조회를 눌러주세요</span></div></div>

<div class="wrap">
  <header class="page">
    <div class="eyebrow">Volume Signal Monitor · Multi-Watchlist</div>
    <h1>거래량 기준 매수·매도 신호 모니터</h1>
    <p>여러 종목코드를 등록해두면 한 화면에서 종목별 매수·매도 신호를 한눈에 비교할 수 있습니다. 카드를 클릭하면 해당 종목의 일별 내역이 아래에 펼쳐집니다.</p>
  </header>

  <div class="panel">
    <div class="controls">
      <div class="field">
        <label for="codeInput">종목코드 추가 (6자리, 영문/숫자)</label>
        <input type="text" id="codeInput" placeholder="예: 446770, Q500A1" maxlength="6">
      </div>
      <button class="secondary" id="addBtn" type="button">+ 추가</button>
      <div class="field">
        <label for="periodSelect">조회 기준</label>
        <select id="periodSelect">
          <option value="30">최근 30거래일</option>
          <option value="60" selected>최근 60거래일</option>
          <option value="90">최근 90거래일</option>
          <option value="120">최근 120거래일</option>
          <option value="240">최근 240거래일</option>
        </select>
      </div>
      <button id="fetchAllBtn">전체 조회</button>
      <button class="secondary" id="settingsToggleBtn" type="button">기준값 설정</button>
    </div>

    <div class="chips" id="chipsRow"></div>

    <div class="status-line" id="statusLine">등록된 종목이 없습니다. 종목코드를 추가해주세요.</div>

    <details id="settingsDetails">
      <summary>기준값 설정 (펼치기)</summary>
      <div class="settings-grid">
        <div class="field"><label>거래량 이동평균 기간(N, 일)</label><input type="text" id="p_n" value="20"></div>
        <div class="field"><label>거래량 급증 기준(배수)</label><input type="text" id="p_mult" value="2.0"></div>
        <div class="field"><label>가격 돌파/이탈 비교기간(일)</label><input type="text" id="p_period" value="20"></div>
        <div class="field"><label>저점 근접 허용범위(%)</label><input type="text" id="p_lowpct" value="3"></div>
        <div class="field"><label>캔들 강도 기준(0~1)</label><input type="text" id="p_candle" value="0.6"></div>
        <div class="field"><label>고점 근접 허용범위(%)</label><input type="text" id="p_highpct" value="3"></div>
        <div class="field"><label>캔들 약세 기준(0~1)</label><input type="text" id="p_weak" value="0.4"></div>
        <div class="field"><label>추세 변동 비교기간(일)</label><input type="text" id="p_trendn" value="20"></div>
        <div class="field"><label>추세 이탈/상승 기준(%)</label><input type="text" id="p_trendpct" value="20"></div>
        <div class="field"><label>이동평균1 기간(일)</label><input type="text" id="p_ma1" value="60"></div>
        <div class="field"><label>이동평균2 기간(일)</label><input type="text" id="p_ma2" value="120"></div>
        <div class="field" style="grid-column:1/-1;">
          <label>프록시 서버 URL (선택 — 직접 배포한 서버리스 프록시가 있다면 입력)</label>
          <input type="text" id="p_proxy" style="width:100%;" placeholder="예: https://내프로젝트.vercel.app/api/stock">
        </div>
      </div>
      <div class="paste-area">
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px;">실시간 조회가 막힐 경우 — 아래에서 종목을 고른 뒤, 네이버금융 일별시세 원본 데이터를 붙여넣고 계산하세요</label>
        <div class="field" style="margin-bottom:8px;">
          <label for="pasteCodeSelect">붙여넣을 데이터의 종목</label>
          <select id="pasteCodeSelect" style="width:220px;"></select>
        </div>
        <textarea id="pasteBox" placeholder='["20260323", 57590, 58000, 56565, 56715, 240734, 0.01],
["20260324", 59225, 59225, 57360, 58325, 239843, 0.01], ...'>
